name: Daily WoW Tier List Updater

on:
  schedule:
    # 매일 UTC 00:00 (한국 시간 오전 9시)에 자동 실행
    - cron: '0 0 * * *' 
  workflow_dispatch: # 우리가 원할 때 버튼을 눌러서 바로 실행할 수도 있게 해줌

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일 저장 권한

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install libraries
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Run Python script
      run: python main.py
    
    - name: Commit and push CSV files
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        # 변경된 파일이 있는지 확인 후, 있을 때만 업로드
        if ! git diff-index --quiet HEAD; then
          git commit -m "Auto-update daily WoW data"
          git push
        else
          echo "업데이트할 새로운 데이터(변경사항)가 없습니다."
        fi
